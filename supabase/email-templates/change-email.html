<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #09090b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #f4f4f5;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #09090b; padding: 40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="background-color: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden;">
                    <tr>
                        <td height="4" style="background: linear-gradient(to right, #fbbf24, #f59e0b);"></td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px;">
                            <div style="background-color: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); width: 56px; height: 56px; line-height: 56px; border-radius: 14px; text-align: center;">
                                <span style="font-size: 28px;">📧</span>
                            </div>
                            <h1 style="font-size: 16px; font-weight: bold; letter-spacing: 0.18em; text-transform: uppercase; margin: 20px 0 0 0; color: #ffffff;">RPG NOTES</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px 50px 40px 50px; text-align: center;">
                            <h2 style="font-size: 24px; font-weight: bold; margin: 0 0 15px 0; color: #ffffff;">Novo Endereço de Email</h2>
                            <p style="font-size: 15px; line-height: 1.6; color: #a1a1aa; margin: 0 0 30px 0;">
                                Você solicitou a alteração do seu e-mail de acesso. Para concluir o ritual de migração, clique no botão abaixo.
                            </p>
                            
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                                <tr>
                                    <td align="center" style="border-radius: 8px; background-color: #fbbf24;">
                                        <a href="{{ .ConfirmationURL }}" target="_blank" style="padding: 14px 32px; font-size: 14px; font-weight: bold; color: #09090b; text-decoration: none; display: inline-block;">
                                            Confirmar Novo Email
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size: 12px; color: #71717a; margin: 30px 0 0 0;">
                                Se você não iniciou este processo, por favor ignore este e-mail.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 0 50px 40px 50px; text-align: center; border-top: 1px solid #27272a;">
                            <div style="padding-top: 30px;">
                                <p style="font-size: 12px; color: #52525b; margin: 0;">Mantenha seus dados protegidos no Grimório.</p>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
